<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Threat Intelligence API — Service health dashboard">
    <title>Threat Intel — Dashboard</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app">
        <!-- Header -->
        <header class="header">
            <div class="logo">
                <div class="logo-icon">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
                    </svg>
                </div>
                <span class="logo-text">Threat Intel</span>
            </div>
            <span class="badge">Internal Platform</span>
        </header>

        <!-- Main Content -->
        <main class="main">
            <!-- Status Banner -->
            <section id="status-banner" class="status-banner status-loading">
                <div class="status-dot-wrapper">
                    <span class="status-dot"></span>
                </div>
                <span id="status-label" class="status-label">Checking service…</span>
            </section>

            <!-- Info Cards -->
            <section class="cards">
                <div class="card">
                    <p class="card-label">Service</p>
                    <p id="card-service" class="card-value">—</p>
                </div>
                <div class="card">
                    <p class="card-label">Version</p>
                    <p id="card-version" class="card-value">—</p>
                </div>
                <div class="card">
                    <p class="card-label">Environment</p>
                    <p id="card-env" class="card-value">—</p>
                </div>
                <div class="card">
                    <p class="card-label">Last Checked</p>
                    <p id="card-time" class="card-value">—</p>
                </div>
            </section>

            <!-- Response Panel -->
            <section class="response-panel">
                <div class="panel-header">
                    <h2 class="panel-title">Raw Response</h2>
                    <button id="refresh-btn" class="refresh-btn" aria-label="Refresh health check">
                        <svg class="refresh-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <polyline points="23 4 23 10 17 10"/>
                            <polyline points="1 20 1 14 7 14"/>
                            <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/>
                        </svg>
                        Refresh
                    </button>
                </div>
                <pre id="json-output" class="json-output"><span class="json-muted">Waiting for response…</span></pre>
            </section>
        </main>

        <!-- Footer -->
        <footer class="footer">
            <p>Threat Intelligence API &middot; Internal Developer Platform</p>
        </footer>
    </div>

    <script src="app.js"></script>
</body>
</html>

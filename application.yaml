apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: threat-api-gitops
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/odonnkongolo/internal-developer-platform.git'
    targetRevision: main
    path: gitops
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true